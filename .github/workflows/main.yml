name: Deploy to Github Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  NEXT_PUBLIC_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_SERVICE_ID }}
  NEXT_PUBLIC_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_TEMPLATE_ID }}
  NEXT_PUBLIC_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PUBLIC_KEY }}

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Build
        run: |
          npm i
          npm run build

      - name: Generate PDF resume
        run: |
          mkdir -p _serve/portfolio
          cp -r out/. _serve/portfolio/
          npx serve _serve -l 3000 --no-clipboard &
          SERVER_PID=$!
          npx wait-on http://localhost:3000/portfolio/resume --timeout 60000
          RESUME_URL=http://localhost:3000/portfolio/resume \
            PDF_OUTPUT=./out/assets/portfolio.pdf \
            node scripts/gen-pdf.js
          kill $SERVER_PID

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./out
